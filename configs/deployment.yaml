# HuggingFace Spaces deployment configuration

title: "Hallucination Hunter RL Environment"
emoji: "🎯"
colorFrom: "blue"
colorTo: "purple"
sdk: "docker"
pinned: false
license: "mit"

# Hardware specifications
hardware:
  cpu: 4
  memory: "16GB"
  storage: "10GB"

