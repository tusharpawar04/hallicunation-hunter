# App configuration
app_file: "app.py"
port: 7860

# Description
short_description: "OpenEnv-compatible RL environment for training hallucination detection in LLMs"

# Tags
tags:
  - reinforcement-learning
  - hallucination-detection
  - openenv
  - rl-environment
  - language-models
  - grpo
  - curriculum-learning
